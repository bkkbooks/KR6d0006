front:
  text: 法華私記緣起沙門灌頂述大法東漸僧史所載詎有幾人不曾聽講自解佛乘者乎縱令發悟復能入定得陀羅尼者不縱具定慧復帝京弘二法不縱令盛席謝遣徒衆隱居山谷不縱避世守玄被徵為二國師不縱帝者所尊太極對御講仁王般若不縱正殿宣揚為主上三禮不縱令萬乘屈膝百高座百官稱美讚歎彈指喧殿不縱道俗顒顒玄悟法華圓意不縱得經意能無文字以樂説辨晝夜流瀉不唯我智者具諸功德幸哉灌頂昔於建業始聽經文次在江陵奉蒙玄義晚還台嶺仍值鶴林荊揚往復途將萬里前後補接才聞一遍非但未聞不聞亦乃聞者未了卷舒鑽仰彌覺堅高猶恨緣淺不再不三咨詢無地如犢思乳並復惟念斯言若墜將來可悲涅槃明若樹若石今經稱若田若里聿遵聖典書而傳之玄文各十卷或以經論誠言符此深妙或標諸師異解驗彼非圓後代行者知甘露門之在茲序王所言妙者妙名不可思議也所言法者十界十如權實之法也蓮華者譬權實法也良以妙法難解假喻易彰況意乃多略擬前後合成六也一為蓮故華譬為實施權文云知第一寂滅以方便力故雖示種種道其實為佛乘二華敷譬開權蓮現譬顯實文云開方便門示真實相三華落譬廢權蓮成譬立實文云正直捨方便但説無上道又蓮譬於本華譬於迹從本垂迹迹依於本文云我實成佛來久遠若斯但教化衆生作如是説我少出家得三菩提二華敷譬開迹蓮現譬顯本文云一切世間皆謂今始得道我成佛來無量無邊那由他劫三華落譬廢迹蓮成譬立本文云諸佛如來法皆如是為度衆生皆實不虛是以先標妙法次喻蓮華蕩化城之執教廢草庵之滯情開方便之權門示真實之妙理會衆善之小行歸廣大之一乘上中下根皆與記莂又發衆聖之權巧顯本地之幽微故增道損生位鄰大覺一期化導事理俱圓蓮華之譬意在斯矣經者外國稱修多羅聖教之都名有翻無翻事如後釋記者釋曰蓋序王者敘經玄意玄意述於文心文心莫過迹本仰觀斯旨衆義冷然妙法蓮華即敘名也示真實之妙理敘體也歸廣大之一乘敘宗也蕩化城之執教敘用也一期化圓敘教也六譬敘迹本也文略意周矣私序王夫理絶偏圓寄圓珠而談理極非遠近託寶所而論極極會圓冥事理俱寂而不寂者良由耽無明酒雖繫珠而不覺迷涅槃道路弗遠而言長聖主世尊愍斯倒惑四華六動開方便之門三變千踊表真實之地咸令一切普得見聞發祕密之奧藏稱之為妙示權實之正軌故號為法指久遠之本果喻之以蓮會不二之圓道譬之以華聲為佛事稱之為經圓詮之初目之為序序類相從稱之為品衆次之首名為第一釋曰談記是敘名會冥是敘體圓珠是敘宗俱寂是敘用四華六動是敘教本迹可知此妙法蓮華經者本地甚深之奧藏也文云是法不可示世間相常住三世如來之所證得也文云是第一寂滅於道場知已大事因緣出現於世始見我身令入佛慧為未入者四十餘年以異方便助顯第一義今正直捨方便但説無上道所言妙者褒美不可思議之法也又妙者十法界十如之法此法即妙此妙即法無二無別故言妙也又妙者自行權實之法妙也故舉蓮華而況之也又妙者即迹而本即本而迹即非本非迹或為開廢云云又妙者最勝修多羅甘露之門故言妙也釋曰妙無別體體上褒美者敘妙名也妙即法界法界即妙者敘體也自行權實者敘宗也本迹六喻者敘用也甘露門者敘教也
